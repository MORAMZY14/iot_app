name: iot
description: "IoT-Smart-Home."
publish_to: 'none'

version: 2.0.3+68

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.15.2
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.1.3
  cloud_functions: ^5.0.4
  firebase_storage: ^12.1.2
  firebase_app_check: ^0.3.0+4
  firebase_messaging: ^15.0.4
  firebase_database: ^11.3.10

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1

  # Storage / Preferences
  shared_preferences: ^2.3.2
  path_provider: ^2.0.11

  # Network / HTTP
  http: ^1.2.2
  url_launcher: ^6.1.7
  wifi_iot: ^0.3.19
  wifi_scan: ^0.4.1
  flutter_blue_plus: ^1.32.11

  # UI
  carousel_slider: ^5.0.0
  font_awesome_flutter: ^10.4.0
  flutter_svg: ^2.1.0
  google_fonts: ^4.0.3
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  haptic_feedback: ^0.5.1+1

  # Media / Files
  image_picker: ^1.1.2
  file_picker: ^10.1.9

  # Permissions
  permission_handler: ^12.0.0+1

  # Notifications
  onesignal_flutter: ^5.2.4

  # Contacts
  flutter_contacts: ^1.1.9+2

  # Communication
  mailer: ^6.1.2
  twilio_flutter: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1   # <--- Added for icon generation

flutter:
  uses-material-design: true
  assets:
    - assets/images/   # <--- Fixed space after dash

# 🔥 Icon configuration (add this at the very bottom)
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"